<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Exam Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
        .header-icon { width: 60px; height: 60px; background: #e0e7ff; color: #6366f1; border-radius: 16px; display: inline-flex; align-items: center; justify-content: center; font-size: 2rem; margin-right: 1.25rem; }
        .custom-card { border: none; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); background: #fff; overflow: hidden; }
        .table-hover tbody tr:hover { background-color: #f8fafc; }
        .table > :not(caption) > * > * { padding: 1.2rem 1.5rem; border-bottom-color: #f1f5f9; vertical-align: middle; }
        .table-light th { background-color: #f8fafc; color: #475569; font-weight: 600; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 0.5px; border-bottom: 2px solid #e2e8f0; }

        .btn-light-custom { background: #f1f5f9; color: #475569; border: none; border-radius: 10px; font-weight: 600; padding: 0.6rem 1.2rem; transition: 0.3s; display: inline-flex; align-items: center; }
        .btn-light-custom:hover { background: #e2e8f0; color: #0f172a; transform: translateY(-2px); }
    </style>
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>

<div class="container mt-5 mb-5">
    <div class="d-flex align-items-center mb-4">
        <div class="header-icon" style="background:#e0f2fe; color:#0284c7;"><i class="bi bi-bar-chart-fill"></i></div>
        <div>
            <h2 class="mb-0 fw-bold text-dark" th:text="${exam.title}">Exam Results</h2>
            <p class="text-muted mb-0">Review of all student submissions and scores.</p>
        </div>
    </div>

    <div class="custom-card mb-4">
        <div th:if="${#lists.isEmpty(results)}" class="text-center py-5">
            <i class="bi bi-inbox text-muted opacity-50" style="font-size: 3rem;"></i>
            <h5 class="mt-3 text-dark fw-bold">No Submissions Yet</h5>
            <p class="text-muted">No student has taken this exam yet.</p>
        </div>

        <div th:unless="${#lists.isEmpty(results)}" class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th scope="col">Student Name</th>
                    <th scope="col">Email (Username)</th>
                    <th scope="col" class="text-center">Raw Score</th>
                    <th scope="col" class="text-center">Percentage</th>
                    <th scope="col" class="text-end pe-4">Submission Date</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="result : ${results}">
                    <td class="fw-bold text-dark" th:text="${result.student.fullName}">Sumit Kumar</td>
                    <td class="text-muted" th:text="${result.student.username}">student@example.com</td>
                    <td class="text-center fw-medium">
                        <span th:text="${result.scoreAchieved}">15</span> <span class="text-muted">/ <span th:text="${result.totalMarks}">20</span></span>
                    </td>
                    <td class="text-center">
                        <th:block th:if="${result.totalMarks > 0}" th:with="percentage=${(result.scoreAchieved * 100.0) / result.totalMarks}">
                            <span class="badge rounded-pill px-3 py-2"
                                  th:classappend="${percentage >= 50 ? 'bg-success-subtle text-success border border-success-subtle' : 'bg-danger-subtle text-danger border border-danger-subtle'}"
                                  th:text="${#numbers.formatDecimal(percentage, 1, 1) + '%'}">
                            </span>
                        </th:block>
                        <span th:if="${result.totalMarks == 0}" class="badge bg-secondary-subtle text-secondary-emphasis">N/A</span>
                    </td>
                    <td class="text-end text-muted pe-4" th:text="${#temporals.format(result.submissionTime, 'dd MMM yyyy, HH:mm')}">25 Oct 2025, 14:30</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div>
        <a th:href="@{/admin/manage-exams}" class="btn btn-light-custom">
            <i class="bi bi-arrow-left me-2"></i>Back to Exams
        </a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
