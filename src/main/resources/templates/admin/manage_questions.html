<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Manage Questions</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background-color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
    .header-icon { width: 60px; height: 60px; background: #e0e7ff; color: #6366f1; border-radius: 16px; display: inline-flex; align-items: center; justify-content: center; font-size: 2rem; margin-right: 1.25rem; }
    .custom-card { border: none; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); background: #fff; overflow: hidden; }
    .table-hover tbody tr:hover { background-color: #f8fafc; }
    .table > :not(caption) > * > * { padding: 1rem 1.5rem; border-bottom-color: #f1f5f9; vertical-align: middle; }
    .table-light th { background-color: #f8fafc; color: #475569; font-weight: 600; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 0.5px; border-bottom: 2px solid #e2e8f0; }

    .btn-indigo { background: #6366f1; color: white; border-radius: 10px; font-weight: 600; padding: 0.6rem 1.2rem; transition: 0.3s; border: none; }
    .btn-indigo:hover { background: #4f46e5; color: white; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(99,102,241,0.2); }
    .btn-light-custom { background: #f1f5f9; color: #475569; border: none; border-radius: 10px; font-weight: 600; padding: 0.6rem 1.2rem; transition: 0.3s; display: inline-flex; align-items: center; }
    .btn-light-custom:hover { background: #e2e8f0; color: #0f172a; transform: translateY(-2px); }

    .action-btn { border-radius: 8px; padding: 0.4rem 0.8rem; font-weight: 600; font-size: 0.85rem; transition: 0.2s; border: none; display: inline-flex; align-items: center; gap: 5px; }
    .btn-soft-warning { background: #fef3c7; color: #d97706; } .btn-soft-warning:hover { background: #d97706; color: white; }
    .btn-soft-danger { background: #fee2e2; color: #dc2626; } .btn-soft-danger:hover { background: #dc2626; color: white; }
  </style>
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>

<div class="container mt-5 mb-5">
  <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show border-0 shadow-sm rounded-3" role="alert">
    <i class="bi bi-exclamation-triangle-fill me-2"></i><strong>Error:</strong> <span th:text="${errorMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
  </div>
  <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show border-0 shadow-sm rounded-3" role="alert">
    <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
  </div>

  <div class="d-flex justify-content-between align-items-center mb-4">
    <div class="d-flex align-items-center">
      <div class="header-icon"><i class="bi bi-list-task"></i></div>
      <div>
        <h2 class="mb-0 fw-bold text-dark">Manage Questions</h2>
        <p class="text-muted mb-0" th:text="|Exam: ${exam.title}|">Exam Title</p>
      </div>
    </div>
    <a th:href="@{/admin/exam/{id}/question/add(id=${exam.id})}" class="btn btn-indigo">
      <i class="bi bi-plus-lg me-2"></i>Add Question
    </a>
  </div>

  <div class="custom-card mb-4">
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead class="table-light">
        <tr>
          <th scope="col" style="width: 50%;">Question Text</th>
          <th scope="col">Marks</th>
          <th scope="col">Correct Answer</th>
          <th scope="col" class="text-end pe-4">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(questions)}">
          <td colspan="4" class="text-center py-5">
            <i class="bi bi-ui-radios text-muted opacity-50" style="font-size: 3rem;"></i>
            <h5 class="mt-3 text-dark fw-bold">No Questions Yet</h5>
            <p class="text-muted">Start building this exam by adding questions.</p>
          </td>
        </tr>
        <tr th:each="q : ${questions}">
          <td class="fw-medium text-dark text-truncate" style="max-width: 400px;" th:text="${q.text}">Question...</td>
          <td><span class="badge bg-indigo text-white px-2 py-1" style="background:#6366f1;" th:text="${q.marks}">5</span></td>
          <td><span class="badge bg-success-subtle text-success border border-success-subtle px-2 py-1" th:text="'Option ' + ${q.correctAnswer}">1</span></td>
          <td class="text-end pe-4">
            <a th:href="@{/admin/question/edit/{id}(id=${q.id})}" class="action-btn btn-soft-warning me-1" title="Edit Question"><i class="bi bi-pencil-fill"></i></a>
            <a th:href="@{/admin/exam/{examId}/question/delete/{qId}(examId=${exam.id}, qId=${q.id})}" class="action-btn btn-soft-danger" title="Delete Question" onclick="return confirm('Are you sure you want to delete this question?');"><i class="bi bi-trash-fill"></i></a>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div>
    <a th:href="@{/admin/manage-exams}" class="btn btn-light-custom">
      <i class="bi bi-arrow-left me-2"></i>Back to Exams
    </a>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
