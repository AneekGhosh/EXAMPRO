<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>My Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background-color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }

    .profile-card { background: #fff; border: none; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 24px; overflow: hidden;}
    .profile-card-header { background: #fff; border-bottom: 1px solid #f1f5f9; padding: 1.5rem; font-weight: 700; color: #0f172a; font-size: 1.25rem; }
    .profile-card-body { padding: 2rem; }

    .profile-pic-lg {
      width: 160px; height: 160px; border-radius: 50%; object-fit: cover;
      border: 4px solid #e0e7ff; box-shadow: 0 10px 15px -3px rgba(99,102,241,0.2);
      margin-bottom: 1.5rem; transition: transform 0.3s;
    }
    .profile-pic-lg:hover { transform: scale(1.05); }

    .form-control { border-radius: 10px; padding: 0.8rem 1rem; border: 1px solid #cbd5e1; background-color: #f8fafc; transition: all 0.2s; }
    .form-control:focus { background-color: #fff; border-color: #6366f1; box-shadow: 0 0 0 4px rgba(99,102,241,0.1); }
    .form-control:disabled { background-color: #e2e8f0; border-color: #e2e8f0; color: #64748b; }
    .form-label { font-weight: 600; color: #334155; margin-bottom: 0.5rem; }

    .btn-indigo { background-color: #6366f1; color: white; border: none; border-radius: 10px; padding: 0.8rem; font-weight: 600; transition: 0.3s; }
    .btn-indigo:hover { background-color: #4f46e5; color: white; transform: translateY(-2px); }
    .btn-warning-custom { background-color: #f59e0b; color: white; border: none; border-radius: 10px; padding: 0.8rem; font-weight: 600; transition: 0.3s; }
    .btn-warning-custom:hover { background-color: #d97706; color: white; transform: translateY(-2px); }
  </style>
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>

<div class="container my-5">
  <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show border-0 shadow-sm rounded-3" role="alert">
    <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
  </div>
  <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show border-0 shadow-sm rounded-3" role="alert">
    <i class="bi bi-exclamation-triangle-fill me-2"></i><strong>Error:</strong> <span th:text="${errorMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
  </div>

  <div class="row g-4">
    <div class="col-lg-4">
      <div class="profile-card text-center">
        <div class="profile-card-body pt-5">
          <img th:if="${student.profilePicUrl != null}" th:src="@{${student.profilePicUrl}}" alt="Profile" class="profile-pic-lg">
          <svg th:if="${student.profilePicUrl == null}" xmlns="http://www.w3.org/2000/svg" width="160" height="160" fill="#6366f1" class="bi bi-person-circle profile-pic-lg bg-white" viewBox="0 0 16 16">
            <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/><path fill-rule="evenodd" d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8zm8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1z"/>
          </svg>
          <h4 class="mb-1 fw-bold text-dark" th:text="${student.fullName}">Student Name</h4>
          <p class="text-muted mb-4" th:text="${student.username}">student@email.com</p>

          <form th:action="@{/student/profile/update-picture}" method="post" enctype="multipart/form-data" class="text-start">
            <div class="mb-3">
              <label for="profilePicFile" class="form-label text-muted small">Update Picture</label>
              <input type="file" class="form-control form-control-sm" id="profilePicFile" name="profilePicFile" accept="image/png, image/jpeg" required>
            </div>
            <button type="submit" class="btn btn-light border w-100 fw-semibold text-primary rounded-3">Upload New</button>
          </form>
        </div>
      </div>
    </div>

    <div class="col-lg-8">
      <div class="profile-card mb-4">
        <div class="profile-card-header"><i class="bi bi-person-lines-fill me-2 text-indigo"></i>Profile Details</div>
        <div class="profile-card-body">
          <form th:action="@{/student/profile/update-details}" th:object="${student}" method="post">
            <div class="row mb-3">
              <div class="col-md-6">
                <label for="fullName" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="fullName" th:field="*{fullName}" required>
              </div>
              <div class="col-md-6">
                <label for="mobileNumber" class="form-label">Mobile Number</label>
                <input type="tel" class="form-control" id="mobileNumber" th:field="*{mobileNumber}">
              </div>
            </div>
            <div class="mb-4">
              <label for="username" class="form-label">Email (Login ID)</label>
              <input type="email" class="form-control" id="username" th:field="*{username}" readonly disabled>
              <small class="text-muted mt-1 d-block"><i class="bi bi-info-circle me-1"></i>Email cannot be changed.</small>
            </div>
            <button type="submit" class="btn btn-indigo px-4">Save Changes</button>
          </form>
        </div>
      </div>

      <div class="profile-card border border-danger border-opacity-10">
        <div class="profile-card-header"><i class="bi bi-shield-lock-fill me-2 text-warning"></i>Security</div>
        <div class="profile-card-body">
          <form th:action="@{/student/profile/update-password}" method="post">
            <div class="mb-3">
              <label for="oldPassword" class="form-label">Current Password</label>
              <input type="password" class="form-control" id="oldPassword" name="oldPassword" required>
            </div>
            <div class="row mb-4">
              <div class="col-md-6">
                <label for="newPassword" class="form-label">New Password</label>
                <input type="password" class="form-control" id="newPassword" name="newPassword" required>
              </div>
              <div class="col-md-6">
                <label for="confirmPassword" class="form-label">Confirm Password</label>
                <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required>
              </div>
            </div>
            <button type="submit" class="btn btn-warning-custom px-4">Update Password</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
