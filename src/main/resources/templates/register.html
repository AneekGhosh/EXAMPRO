<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register - ExamPro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; }
        .auth-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        .auth-header {
            background-color: #0f172a;
            color: white;
            padding: 2rem 1rem;
            text-align: center;
        }
        .form-control {
            background-color: #f1f5f9;
            border: 1px solid transparent;
            padding: 0.75rem 1rem;
        }
        .form-control:focus {
            background-color: #ffffff;
            border-color: #6366f1;
            box-shadow: 0 0 0 0.25rem rgba(99, 102, 241, 0.25);
        }
        .btn-brand {
            background-color: #6366f1;
            color: white;
            font-weight: 600;
            padding: 0.75rem;
            border-radius: 8px;
            border: none;
        }
        .btn-brand:hover { background-color: #4f46e5; color: white; }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

<div th:replace="~{fragments :: navbar}"></div>

<div class="container mt-5 mb-5 flex-grow-1 d-flex align-items-center justify-content-center">
    <div class="col-md-6">
        <div class="card auth-card">
            <div class="auth-header">
                <h3 class="mb-0 fw-bold">Create Account</h3>
                <p class="text-muted mb-0 mt-1 small">Join ExamPro to start your journey</p>
            </div>
            <div class="card-body p-4 p-md-5">

                <div th:if="${param.success}" class="alert alert-success rounded-3 text-center small">
                    Registration successful! You can now <a th:href="@{/login}" class="fw-bold text-success text-decoration-none">login here</a>.
                </div>

                <form th:action="@{/register}" th:object="${user}" method="post" enctype="multipart/form-data">
                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <label for="fullName" class="form-label fw-medium text-muted small">Full Name</label>
                            <input type="text" class="form-control" id="fullName" th:field="*{fullName}" placeholder="John Doe">
                        </div>
                        <div class="col-md-12 mb-3">
                            <label for="username" class="form-label fw-medium text-muted small">Email Address</label>
                            <input type="email" class="form-control" id="username" th:field="*{username}" placeholder="name@example.com" required>
                            <div th:if="${#fields.hasErrors('username')}" class="text-danger mt-1 small" th:errors="*{username}"></div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="mobileNumber" class="form-label fw-medium text-muted small">Mobile Number</label>
                            <input type="tel" class="form-control" id="mobileNumber" th:field="*{mobileNumber}" placeholder="+1 234 567 890">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="password" class="form-label fw-medium text-muted small">Password</label>
                            <input type="password" class="form-control" id="password" th:field="*{password}" placeholder="••••••••" required>
                        </div>
                        <div class="col-md-12 mb-4">
                            <label for="profilePicFile" class="form-label fw-medium text-muted small">Profile Picture</label>
                            <input type="file" class="form-control bg-white" id="profilePicFile" name="profilePicFile" accept="image/png, image/jpeg">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-brand w-100">Register Account</button>
                </form>
                <div class="text-center mt-4">
                    <p class="text-muted small">Already have an account? <a th:href="@{/login}" class="text-decoration-none fw-semibold" style="color: #6366f1;">Sign in</a></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
