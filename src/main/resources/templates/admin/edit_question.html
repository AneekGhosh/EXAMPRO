<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Question</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
        .custom-card { border: none; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); background: #fff; }
        .card-header-custom { background: transparent; border-bottom: 1px solid #f1f5f9; padding: 1.5rem; font-weight: 700; color: #0f172a; font-size: 1.25rem; display: flex; align-items: center;}
        .form-control { border-radius: 10px; padding: 0.8rem 1rem; border: 1px solid #cbd5e1; background-color: #f8fafc; transition: all 0.2s; }
        .form-control:focus { background-color: #fff; border-color: #6366f1; box-shadow: 0 0 0 4px rgba(99,102,241,0.1); }
        .form-label { font-weight: 600; color: #334155; margin-bottom: 0.5rem; }
        .btn-warning-custom { background: #f59e0b; color: white; border-radius: 10px; font-weight: 600; padding: 0.8rem 1.5rem; transition: 0.3s; border: none; }
        .btn-warning-custom:hover { background: #d97706; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(245,158,11,0.2); color:white;}
        .btn-light-custom { background: #f1f5f9; color: #475569; border: none; border-radius: 10px; font-weight: 600; padding: 0.8rem 1.5rem; transition: 0.3s; }
        .btn-light-custom:hover { background: #e2e8f0; color: #0f172a; }
    </style>
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="custom-card">
                <div class="card-header-custom">
                    <i class="bi bi-pencil-square me-2 text-warning"></i> Edit Question
                </div>
                <div class="card-body p-4 p-md-5">
                    <form th:action="@{/admin/question/update/{id}(id=${question.id})}" th:object="${question}" method="post">

                        <div class="mb-4">
                            <label for="text" class="form-label">Question Text</label>
                            <textarea class="form-control" id="text" th:field="*{text}" rows="3" required></textarea>
                        </div>

                        <div class="row bg-light p-3 rounded-4 mb-4 border" style="border-color:#f1f5f9;">
                            <div class="col-md-6 mb-3">
                                <label for="option1" class="form-label text-secondary">Option 1</label>
                                <input type="text" class="form-control bg-white" id="option1" th:field="*{option1}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="option2" class="form-label text-secondary">Option 2</label>
                                <input type="text" class="form-control bg-white" id="option2" th:field="*{option2}" required>
                            </div>
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label for="option3" class="form-label text-secondary">Option 3</label>
                                <input type="text" class="form-control bg-white" id="option3" th:field="*{option3}" required>
                            </div>
                            <div class="col-md-6">
                                <label for="option4" class="form-label text-secondary">Option 4</label>
                                <input type="text" class="form-control bg-white" id="option4" th:field="*{option4}" required>
                            </div>
                        </div>

                        <div class="row mb-5">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label for="correctAnswer" class="form-label text-success"><i class="bi bi-check2-circle me-1"></i> Correct Answer (1-4)</label>
                                <input type="number" class="form-control border-success-subtle bg-success-subtle" id="correctAnswer" th:field="*{correctAnswer}" min="1" max="4" required>
                            </div>
                            <div class="col-md-6">
                                <label for="marks" class="form-label text-indigo" style="color:#6366f1;"><i class="bi bi-award me-1"></i> Marks</label>
                                <input type="number" class="form-control border-primary-subtle" id="marks" th:field="*{marks}" min="1" required>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <a th:href="@{/admin/exam/manage-questions/{id}(id=${question.exam.id})}" class="btn btn-light-custom w-50 text-center">Cancel</a>
                            <button type="submit" class="btn btn-warning-custom w-50"><i class="bi bi-save me-1"></i> Update Question</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
