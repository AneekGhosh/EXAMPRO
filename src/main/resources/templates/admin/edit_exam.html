<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Edit Exam</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background-color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
    .custom-card { border: none; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); background: #fff; }
    .card-header-custom { background: transparent; border-bottom: 1px solid #f1f5f9; padding: 1.5rem; font-weight: 700; color: #0f172a; font-size: 1.25rem; display: flex; align-items: center;}
    .form-control { border-radius: 10px; padding: 0.8rem 1rem; border: 1px solid #cbd5e1; background-color: #f8fafc; transition: all 0.2s; }
    .form-control:focus { background-color: #fff; border-color: #6366f1; box-shadow: 0 0 0 4px rgba(99,102,241,0.1); }
    .form-label { font-weight: 600; color: #334155; margin-bottom: 0.5rem; }
    .btn-warning-custom { background: #f59e0b; color: white; border-radius: 10px; font-weight: 600; padding: 0.8rem 1.5rem; transition: 0.3s; border: none; }
    .btn-warning-custom:hover { background: #d97706; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(245,158,11,0.2); color: white;}
    .btn-light-custom { background: #f1f5f9; color: #475569; border: none; border-radius: 10px; font-weight: 600; padding: 0.8rem 1.5rem; transition: 0.3s; }
    .btn-light-custom:hover { background: #e2e8f0; color: #0f172a; }
  </style>
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="custom-card">
        <div class="card-header-custom">
          <i class="bi bi-pencil-square me-2 text-warning"></i> Edit Exam
        </div>
        <div class="card-body p-4">
          <form th:action="@{/admin/exam/update/{id}(id=${exam.id})}" th:object="${exam}" method="post">
            <div class="mb-4">
              <label for="title" class="form-label">Exam Title</label>
              <input type="text" class="form-control" id="title" th:field="*{title}" required>
            </div>
            <div class="mb-4">
              <label for="duration" class="form-label">Duration (in minutes)</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-end-0" style="border-radius: 10px 0 0 10px; border-color: #cbd5e1;"><i class="bi bi-stopwatch text-muted"></i></span>
                <input type="number" class="form-control border-start-0 ps-0" id="duration" th:field="*{durationInMinutes}" min="1" required>
              </div>
            </div>
            <div class="d-flex gap-2 mt-5">
              <a th:href="@{/admin/manage-exams}" class="btn btn-light-custom w-50 text-center">Cancel</a>
              <button type="submit" class="btn btn-warning-custom w-50"><i class="bi bi-check2-circle me-1"></i> Update Exam</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
