<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Manage Exams</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background-color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
    .header-icon { width: 60px; height: 60px; background: #e0e7ff; color: #6366f1; border-radius: 16px; display: inline-flex; align-items: center; justify-content: center; font-size: 2rem; margin-right: 1.25rem; }
    .custom-card { border: none; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); background: #fff; overflow: hidden; }
    .table-hover tbody tr:hover { background-color: #f8fafc; }
    .table > :not(caption) > * > * { padding: 1rem 1.5rem; border-bottom-color: #f1f5f9; vertical-align: middle; }
    .table-light th { background-color: #f8fafc; color: #475569; font-weight: 600; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 0.5px; border-bottom: 2px solid #e2e8f0; }

    .btn-indigo { background: #6366f1; color: white; border-radius: 10px; font-weight: 600; padding: 0.6rem 1.2rem; transition: 0.3s; border: none; }
    .btn-indigo:hover { background: #4f46e5; color: white; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(99,102,241,0.2); }

    .action-btn { border-radius: 8px; padding: 0.4rem 0.8rem; font-weight: 600; font-size: 0.85rem; transition: 0.2s; border: none; display: inline-flex; align-items: center; gap: 5px; }
    .btn-soft-success { background: #dcfce7; color: #16a34a; } .btn-soft-success:hover { background: #16a34a; color: white; }
    .btn-soft-info { background: #e0f2fe; color: #0284c7; } .btn-soft-info:hover { background: #0284c7; color: white; }
    .btn-soft-secondary { background: #f1f5f9; color: #475569; } .btn-soft-secondary:hover { background: #cbd5e1; color: #0f172a; }
    .btn-soft-warning { background: #fef3c7; color: #d97706; } .btn-soft-warning:hover { background: #d97706; color: white; }
    .btn-soft-danger { background: #fee2e2; color: #dc2626; } .btn-soft-danger:hover { background: #dc2626; color: white; }
  </style>
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>

<div class="container mt-5 mb-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div class="d-flex align-items-center">
      <div class="header-icon"><i class="bi bi-journals"></i></div>
      <div>
        <h2 class="mb-0 fw-bold text-dark">Manage Exams</h2>
        <p class="text-muted mb-0">Create, edit, and oversee all assessments.</p>
      </div>
    </div>
    <a th:href="@{/admin/exam/add}" class="btn btn-indigo">
      <i class="bi bi-plus-lg me-2"></i>Create New Exam
    </a>
  </div>

  <div class="custom-card">
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead class="table-light">
        <tr>
          <th scope="col">Exam Title</th>
          <th scope="col">Duration</th>
          <th scope="col">Questions</th>
          <th scope="col" class="text-end pe-4">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(exams)}">
          <td colspan="4" class="text-center py-5">
            <i class="bi bi-inbox text-muted opacity-50" style="font-size: 3rem;"></i>
            <h5 class="mt-3 text-dark fw-bold">No Exams Found</h5>
            <p class="text-muted">Click "Create New Exam" to get started.</p>
          </td>
        </tr>
        <tr th:each="exam : ${exams}">
          <td class="fw-bold text-dark" th:text="${exam.title}">Sample Exam Title</td>
          <td><span class="badge bg-light text-dark border"><i class="bi bi-clock me-1"></i> <span th:text="${exam.durationInMinutes}"></span> Mins</span></td>
          <td><span class="badge bg-light text-dark border"><i class="bi bi-list-ol me-1"></i> <span th:text="${#lists.size(exam.questions)}"></span> Qs</span></td>
          <td class="text-end pe-4">
            <a th:href="@{/admin/exam/{examId}/question/add(examId=${exam.id})}" class="action-btn btn-soft-success me-1" title="Add Questions"><i class="bi bi-plus-lg"></i> Add Qs</a>
            <a th:href="@{/admin/results/{examId}(examId=${exam.id})}" class="action-btn btn-soft-info me-1" title="View Results"><i class="bi bi-bar-chart-fill"></i> Results</a>
            <a th:href="@{/admin/exam/manage-questions/{examId}(examId=${exam.id})}" class="action-btn btn-soft-secondary me-1" title="Manage Questions"><i class="bi bi-list-task"></i> Mng Qs</a>
            <a th:href="@{/admin/exam/edit/{examId}(examId=${exam.id})}" class="action-btn btn-soft-warning me-1" title="Edit Exam"><i class="bi bi-pencil-fill"></i> Edit</a>
            <a th:href="@{/admin/exam/delete/{examId}(examId=${exam.id})}" class="action-btn btn-soft-danger" title="Delete Exam" onclick="return confirm('Are you sure you want to delete this exam? This will delete all associated questions and results.');"><i class="bi bi-trash-fill"></i></a>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
