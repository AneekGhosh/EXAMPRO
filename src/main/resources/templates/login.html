<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - ExamPro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; }
        .auth-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        .auth-header {
            background-color: #0f172a;
            color: white;
            padding: 2rem 1rem;
            text-align: center;
        }
        .btn-brand {
            background-color: #6366f1;
            color: white;
            font-weight: 600;
            padding: 0.75rem;
            border-radius: 8px;
        }
        .btn-brand:hover { background-color: #4f46e5; color: white; }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

<div th:replace="~{fragments :: navbar}"></div>

<div class="container mt-5 flex-grow-1 d-flex align-items-center justify-content-center">
    <div class="col-md-5">
        <div class="card auth-card">
            <div class="auth-header">
                <h3 class="mb-0 fw-bold">Welcome Back</h3>
                <p class="text-muted mb-0 mt-1 small">Sign in to continue to ExamPro</p>
            </div>
            <div class="card-body p-4 p-md-5">

                <div th:if="${param.error}" class="alert alert-danger rounded-3 text-center small">
                    Invalid username or password.
                </div>
                <div th:if="${param.logout}" class="alert alert-success rounded-3 text-center small">
                    You have been successfully logged out.
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="mb-4">
                        <label for="username" class="form-label fw-medium text-muted small">Email Address</label>
                        <input type="text" class="form-control form-control-lg bg-light border-0" id="username" name="username" placeholder="name@example.com" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label fw-medium text-muted small">Password</label>
                        <input type="password" class="form-control form-control-lg bg-light border-0" id="password" name="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-brand w-100 border-0">Sign In</button>
                </form>
                <div class="text-center mt-4">
                    <p class="text-muted small">New student? <a th:href="@{/register}" class="text-decoration-none fw-semibold" style="color: #6366f1;">Create an account</a></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
